<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automatic Rotary Phone</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .phone {
      background: #222;
      padding: 24px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .screen {
      background: #000;
      color: #00ff90;
      padding: 14px;
      border-radius: 10px;
      font-size: 28px;
      letter-spacing: 4px;
      margin-bottom: 20px;
      min-height: 34px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    button {
      padding: 18px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #333;
      color: white;
    }

    button:hover {
      background: #444;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .call {
      background: #1f8f4e;
    }

    .clear {
      background: #a33;
    }

    .message {
      margin-top: 16px;
      color: #ccc;
      min-height: 24px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <h1>Automatic Rotary Phone</h1>
    <div class="screen" id="screen">-</div>

    <div class="grid" id="buttons"></div>

    <div class="actions">
      <button class="call" id="callBtn">Call</button>
      <button class="clear" id="clearBtn">Clear</button>
    </div>

    <div class="message" id="message">Simple fun phone app</div>
  </div>

  <script>
    const screen = document.getElementById('screen');
    const message = document.getElementById('message');
    const buttons = document.getElementById('buttons');
    const callBtn = document.getElementById('callBtn');
    const clearBtn = document.getElementById('clearBtn');

    let number = '';

    const replies = {
      '911': 'Emergency bot picked up.',
      '123': 'Test line connected.',
      '000': 'Operator says hello.',
      '8675309': 'Jenny is not available.'
    };

    function updateScreen() {
      screen.textContent = number || '-';
    }

    function pressDigit(digit) {
      if (number.length >= 12) return;
      number += digit;
      updateScreen();
      message.textContent = 'Dialing...';
    }

    ['1','2','3','4','5','6','7','8','9','0'].forEach(digit => {
      const btn = document.createElement('button');
      btn.textContent = digit;
      btn.onclick = () => pressDigit(digit);
      buttons.appendChild(btn);
    });

    callBtn.onclick = () => {
      if (!number) {
        message.textContent = 'Enter a number first.';
        return;
      }
      message.textContent = replies[number] || `Calling ${number}... no answer.`;
    };

    clearBtn.onclick = () => {
      number = '';
      updateScreen();
      message.textContent = 'Cleared.';
    };

    updateScreen();
  </script>
</body>
</html>
